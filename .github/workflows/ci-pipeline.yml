name: Full CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md' # Don't run if only documentation changes
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint
        continue-on-error: true # Allows the pipeline to continue even if linting fails

      - name: Run Tests
        run: npm test

      - name: Build Application
        # Only run the build once (on the latest Node version) to save time/resources
        if: matrix.node-version == '22.x'
        run: npm run build

      - name: Upload Build Artifact
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: production-assets
          path: dist/
          retention-days: 5
